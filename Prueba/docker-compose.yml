version: '3.8'

services:
    backend:
        build: 
            context: ./backendPruebas
            dockerfile: Dockerfile
        container_name: prueba_backend
        restart: unless-stopped
        ports:
            - "8010:80"
        volumes:
            - ./backendPruebas:/var/www/html
        depends_on:
            - db
        networks:
            - prueba_network
    frontend:
        build:
            context: ./frontendPrueba
            dockerfile: Dockerfile
        container_name: prueba_frontend
        restart: unless-stopped
        ports:
            - "8020:80"
        volumes:
            - ./frontendPrueba:/var/www/html
        networks:
            - prueba_network
    db:
        image: mysql:latest
        container_name: prueba_container_db
        restart: unless-stopped
        ports:
            - "3308:3306"
        environment:
            MYSQL_DATABASE: prueba_db
            MYSQL_USER: prueba_user
            MYSQL_PASSWORD: secret
            MYSQL_ROOT_PASSWORD: secret
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - prueba_network

volumes:
    db_data:
networks:
    prueba_network:
        driver: bridge